<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Syllabus Planner | Faculty Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ai-header { 
            background: var(--primary-grad); color: white; padding: 20px; 
            border-radius: 8px; margin-bottom: 25px; text-align: center; 
        }
        #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: #6a11cb; }
        .spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #6a11cb; border-radius: 50%; 
            width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .planner-controls { background: var(--bg-secondary); padding: 20px; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .row-done { background-color: #d4edda !important; }
        .text-done { text-decoration: line-through; color: #6c757d; }
    </style>
</head>
<body>

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="secondary-btn" onclick="window.location.href='dashboard.html'">← Back</button>
            <h2>Faculty Planner</h2>
        </div>
    </nav>
    
    <div class="container">
        <div class="ai-header">
            <h2>⚡ AI Smart Tracker</h2>
            <p>Subject: <span id="subjectLabel" style="font-weight:bold;">Loading...</span></p>
        </div>

        <div class="planner-controls">
            <label><strong>Syllabus Goals / Extract from PDF:</strong></label>
            <textarea id="promptInput" class="input-box" style="height: 100px;" placeholder="Describe how you want to divide the topics..."></textarea>
            
            <p style="margin: 10px 0;">Plan for: <strong id="daysDisplay">--</strong> Days</p>
            <button class="primary-btn" id="genBtn" onclick="generateSyllabus()">✨ Generate & Save Plan</button>
        </div>

        <div id="loader">
            <div class="spinner"></div><br>
            AI is organizing your syllabus into the database...
        </div>

        <table class="data-table" id="resultTable" style="display: none;">
            <thead>
                <tr>
                    <th style="width: 10%; text-align: center;">Done</th>
                    <th style="width: 15%;">Day</th>
                    <th>Topic</th>
                    <th style="width: 15%;">Action</th>
                </tr>
            </thead>
            <tbody id="plannerBody"></tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class'); // Backend route matches 'classId'

        let classData = null;

        // 1. Page Load par existing data fetch karo
        window.onload = async () => {
            if (!classId) return window.location.href = 'dashboard.html';
            
            const res = await api.get(`/planner/${classId}`);
            if (res.success) {
                classData = res;
                document.getElementById('subjectLabel').innerText = res.num_days + " Days Plan";
                document.getElementById('daysDisplay').innerText = res.num_days;
                
                if (res.items && res.items.length > 0) {
                    renderTable(res.items);
                }
            } else {
                alert("Session expired. Please login again.");
                window.location.href = 'index.html';
            }
        };

        function renderTable(items) {
            const table = document.getElementById('resultTable');
            const tbody = document.getElementById('plannerBody');
            tbody.innerHTML = '';
            table.style.display = 'table';

            items.forEach((item, i) => {
                const row = document.createElement('tr');
                if (item.is_done) row.className = 'row-done';

                row.innerHTML = `
                    <td style="text-align: center;">
                        <input type="checkbox" ${item.is_done ? 'checked' : ''} onchange="toggleDay(${item.day_no})">
                    </td>
                    <td><strong>Day ${item.day_no}</strong></td>
                    <td>
                        <input type="text" id="topic_${item.day_no}" class="edit-input ${item.is_done ? 'text-done' : ''}" value="${item.topic}">
                    </td>
                    <td>
                        <button class="success-btn" onclick="updateTopic(${item.day_no})">Save</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function generateSyllabus() {
            const promptText = document.getElementById('promptInput').value;
            const loader = document.getElementById('loader');
            const genBtn = document.getElementById('genBtn');

            loader.style.display = 'block';
            genBtn.disabled = true;

            try {
                // 1. NAYA STEP: Apne backend se securely API Key mango
                const keyRes = await api.get('/get-ai-key');
                const SECURE_GROQ_KEY = keyRes.key;

                if (!SECURE_GROQ_KEY) throw new Error("API Key backend mein nahi mili!");

                // 2. Ab AI ko call karo (SECURE_GROQ_KEY use karke)
                const totalDays = classData.num_days;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${SECURE_GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: `You are a syllabus planner. You MUST always return a JSON array with EXACTLY the number of elements the user asks for. Never return fewer or more. If topics are fewer, split them into sub-topics. If topics are more, merge similar ones. The array must have EXACTLY the requested count.`
                            },
                            {
                                role: "user",
                                content: `Divide the following syllabus into EXACTLY ${totalDays} days (the JSON array MUST have exactly ${totalDays} strings, no more, no less).\n\nSyllabus:\n${classData.syllabus_text}\n\nExtra Goal: ${promptText || 'None'}\n\nRules:\n- Return ONLY a valid JSON array of exactly ${totalDays} strings.\n- Each string is a topic for one day.\n- Do NOT add any explanation, markdown, or extra text.\n- The array length must be exactly ${totalDays}.`
                            }
                        ],
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const rawText = data.choices[0].message.content;
                const jsonMatch = rawText.match(/\[[\s\S]*\]/);
                
                if (!jsonMatch) {
                    throw new Error("AI ne sahi format mein jawab nahi diya. Please Generate dobara click karein.");
                }

                let topicsArray = JSON.parse(jsonMatch[0]);

                // ✅ STRICT VALIDATION: Agar AI ne kam topics diye toh fix karo
                if (topicsArray.length < totalDays) {
                    const missing = totalDays - topicsArray.length;
                    const lastTopic = topicsArray[topicsArray.length - 1] || "Revision & Practice";
                    for (let m = 0; m < missing; m++) {
                        topicsArray.push(`Day ${topicsArray.length + 1}: Revision & Practice`);
                    }
                }

                // ✅ Agar AI ne zyada topics diye toh trim karo
                if (topicsArray.length > totalDays) {
                    topicsArray = topicsArray.slice(0, totalDays);
                }

                const itemsToSave = topicsArray.map((topic, i) => ({
                    day_no: i + 1,
                    topic: topic,
                    is_done: false
                }));

                const saveRes = await api.post(`/planner/${classId}/save`, { items: itemsToSave });
                if (saveRes.success) {
                    location.reload();
                } else {
                    throw new Error(saveRes.message);
                }
            } catch (err) {
                alert("Error: " + err.message); 
            } finally {
                loader.style.display = 'none';
                genBtn.disabled = false;
            }
        }

        async function toggleDay(dayNo) {
            const res = await api.patch(`/planner/${classId}/toggle/${dayNo}`);
            if (res.success) location.reload();
        }

        async function updateTopic(dayNo) {
            const newTopic = document.getElementById(`topic_${dayNo}`).value;
            const res = await api.patch(`/planner/${classId}/update/${dayNo}`, { topic: newTopic });
            if (res.success) alert("Topic Updated!");
        }

        // Theme Toggle Logic
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            themeBtn.innerText = isDark ? '🌙' : '☀️';
        };
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '☀️';
        }
    </script>
</body>
</html>
